    <!-- Phase 4 D-09: legacy Phase 1 static JSON-LD (SoftwareApplication + Organization) removed.
         scripts/seo-routes.ts now authors per-route schema graphs with @id cross-refs, and
         scripts/prerender.mjs#applyJsonLd injects them per file. CONTEXT D-09: "Phase 4 generalizes
         what Phase 1 hardcoded." Keeping the old blocks would create duplicate entities on every
         prerendered route (since prerender consumes this template). -->

    <!-- Phase 2.2: Paddle SDK is no longer loaded site-wide. scripts/prerender.mjs injects
         the sync <script src="paddle.js"> tag AND the preconnect into dist/pay/index.html
         only (the route that needs window.Paddle synchronously). On other routes the SDK
         loads on demand via src/lib/paddle.ts when the user navigates to /pay through
         React Router. PageSpeed flagged a site-wide preconnect as "unused" on landing. -->

    <!-- Phase 2.2 + post-2026-05-17 GEO audit CR-4: preload ONLY Unbounded (H1 hero — LCP element
         on every landing). PT Root UI preload dropped: it was competing with the LCP fetch on
         mobile (3.5s LCP measured on RU), and its @font-face now uses font-display: optional, so
         the browser uses the system fallback if PT Root UI doesn't arrive in ~100ms — zero CLS,
         body text stays readable, LCP unblocked. -->
    <link rel="preload" href="/fonts/Unbounded-VF.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
