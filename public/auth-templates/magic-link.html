<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex,nofollow">
    <meta name="color-scheme" content="light dark">
    <meta name="supported-color-schemes" content="light dark">
    <title>Your Opten sign-in code</title>
  </head>
  <body bgcolor="#000A0D" style="margin:0;padding:0;background:#000A0D;color:#ffffff;font-family:Inter,Arial,Helvetica,sans-serif;-webkit-text-size-adjust:100%;text-size-adjust:100%;">
    <div style="display:none;max-height:0;overflow:hidden;opacity:0;color:transparent;">
      Opten sign-in code: {{ .Token }}.
    </div>
    <table role="presentation" width="100%" height="780" cellpadding="0" cellspacing="0" bgcolor="#000A0D" style="width:100%;height:780px;border-collapse:collapse;background:#000A0D;">
      <tr>
        <td align="center" valign="middle" bgcolor="#000A0D" style="height:780px;padding:0;background:#000A0D;vertical-align:middle;">
          <table
            role="presentation"
            width="420"
            height="400"
            cellpadding="0"
            cellspacing="0"
            background="https://opten.space/auth-templates/opten-email-bg.png"
            bgcolor="#000A0D"
            style="width:420px;height:400px;border-collapse:collapse;background-color:#000A0D;background-image:url('https://opten.space/auth-templates/opten-email-bg.png');background-repeat:no-repeat;"
          >
            <tr>
              <td style="height:4px;background:#9cfb51;font-size:0;line-height:4px;">&nbsp;</td>
            </tr>
            <tr>
              <td align="center" style="height:45px;font-size:0;line-height:45px;">&nbsp;</td>
            </tr>
            <tr>
              <td align="center" style="height:28px;font-size:0;line-height:0;">
                <table role="presentation" cellpadding="0" cellspacing="0" style="border-collapse:collapse;">
                  <tr>
                    <td width="28" height="28" style="width:28px;height:28px;font-size:0;line-height:0;">
                      <img src="https://opten.space/auth-templates/opten-logo-mark.png" width="28" height="28" alt="" style="display:block;width:28px;height:28px;border:0;">
                    </td>
                    <td width="4" style="width:4px;font-size:0;line-height:0;">&nbsp;</td>
                    <td width="66" height="28" style="width:66px;height:28px;font-size:0;line-height:0;">
                      <img src="https://opten.space/auth-templates/opten-logo-text.png" width="66" height="28" alt="Opten" style="display:block;width:66px;height:28px;border:0;">
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td align="center" style="height:25px;font-size:0;line-height:25px;">&nbsp;</td>
            </tr>
            <tr>
              <td align="center" style="height:35px;color:#ffffff;font-family:Inter,Arial,Helvetica,sans-serif;font-size:27px;font-weight:500;line-height:35px;letter-spacing:0;text-align:center;">
                Your Opten sign-in code
              </td>
            </tr>
            <tr>
              <td align="right" style="height:10px;padding:0 55px 0 0;font-size:0;line-height:0;">
                <img src="https://opten.space/auth-templates/opten-code-underline.png" width="91" height="10" alt="" style="display:block;width:91px;height:10px;border:0;">
              </td>
            </tr>
            <tr>
              <td align="center" style="height:29px;font-size:0;line-height:29px;">&nbsp;</td>
            </tr>
            <tr>
              <td align="center" style="height:59px;">
                <table role="presentation" width="372" height="59" cellpadding="0" cellspacing="0" style="width:372px;height:59px;border-collapse:separate;background:#9cfb51;border-radius:9px;">
                  <tr>
                    <td align="center" valign="middle" style="height:59px;color:#000A0D;font-family:Inter,Arial,Helvetica,sans-serif;font-size:27px;font-weight:600;line-height:35px;text-align:center;">
                      <span style="display:inline-block;padding-left:3px;letter-spacing:3px;text-align:center;">{{ .Token }}</span>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td align="center" style="height:14px;font-size:0;line-height:14px;">&nbsp;</td>
            </tr>
            <tr>
              <td align="center" valign="bottom" style="height:71px;padding:0 24px;color:rgba(255,255,255,0.6);font-family:Inter,Arial,Helvetica,sans-serif;font-size:11px;font-weight:400;line-height:14.3px;text-align:center;vertical-align:bottom;">
                <div style="margin:0 0 8px 0;padding:0;">
                  Enter this code on the Opten website or in the Opten extension.<br>
                  The code expires soon and can be used only once.
                </div>
                <div style="margin:0;padding:0;">
                  If you did not request sign-in, you can ignore this email.
                </div>
              </td>
            </tr>
            <tr>
              <td style="height:80px;font-size:0;line-height:80px;">&nbsp;</td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
