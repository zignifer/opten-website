docs:
  # Binding interface with the Chrome extension — treated as ADR (locked decisions)
  - path: docs/INTEGRATION-CONTRACT.md
    type: ADR
    precedence: 0

  # Architectural overview + tech snapshot — DOCs (context)
  - path: docs/ARCHITECTURE.md
    type: DOC
    precedence: 3

  - path: docs/TECH.md
    type: DOC
    precedence: 3

  # SEO baseline snapshot — DOC (informational, not a plan)
  - path: docs/SEO-AUDIT.md
    type: DOC
    precedence: 3

  # GEO audit — DOC, the audit findings that motivate the GEO milestone
  - path: .geo-audit/GEO-AUDIT-REPORT.md
    type: DOC
    precedence: 3

  # GEO Phase A design — SPEC (was specced under Superpowers, will migrate to GSD phase)
  - path: docs/superpowers/specs/2026-05-14-geo-phase-a-design.md
    type: SPEC
    precedence: 1

  # GEO Phase A plan — also SPEC-class (implementation spec)
  - path: docs/superpowers/plans/2026-05-14-geo-phase-a.md
    type: SPEC
    precedence: 1
